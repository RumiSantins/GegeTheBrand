version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/app
      # 🔥 Este volumen persistirá las imágenes adjuntas
      - ./backend/static:/app/static
    environment:
      - DATABASE_URL=sqlite:///./database.db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
